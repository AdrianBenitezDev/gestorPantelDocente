<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <title>Formulario de Registro</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
        background-color: #f2f2f2;
      }
      .form-container {
        background-color: #fff;
        padding: 30px 40px;
        max-width: 600px;
        margin: auto;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      }
      h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #555;
      }
      input {
        width: 100%;
        padding: 10px;
        margin-bottom: 18px;
        border: 1px solid #ccc;
        border-radius: 6px;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        padding: 12px;
        background-color: #007acc;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
      }
      button:hover {
        background-color: #005fa3;
      }
      #mensaje {
        margin-top: 15px;
        text-align: center;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <h2>Formulario de Registro</h2>
      <form id="formRegistro" onsubmit="registrar(event)">
        <label for="distrito">Distrito</label>
        <input type="text" id="distrito" required>

        <label for="nivel">Nivel</label>
        <input type="text" id="nivel" required>

        <label for="escuela">Número de escuela</label>
        <input type="number" id="escuela" required>

        <label for="nombre">Apellido y nombre</label>
        <input type="text" id="nombre" required>

        <label for="contacto">Número de contacto</label>
        <input type="tel" id="contacto" required>

        <label for="correo">Correo electrónico institucional</label>
        <input type="email" id="correo" required>

        <label for="correoAlt">Correo electrónico alternativo (opcional)</label>
        <input type="email" id="correoAlt">

        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" required>

        <label for="password">Contraseña</label>
        <input type="password" id="password" required>

        <label for="password2">Repetir Contraseña</label>
        <input type="password" id="password2" required>

        <button type="submit">Registrarse</button>
        <p id="mensaje"></p>
      </form>
    </div>

    <script>
      function registrar(event) {
        event.preventDefault();

        const nombre = document.getElementById("nombre").value.trim();
        const contacto = document.getElementById("contacto").value.trim();
        const correo = document.getElementById("correo").value.trim();
        const correoAlt = document.getElementById("correoAlt").value.trim();
        const escuela = document.getElementById("escuela").value.trim();
        const distrito = document.getElementById("distrito").value.trim();
        const nivel = document.getElementById("nivel").value.trim();
        const usuario = document.getElementById("usuario").value.trim();
        const password = document.getElementById("password").value.trim();
        const password2 = document.getElementById("password2").value.trim();

        const mensaje = document.getElementById("mensaje");

        if (!correo.endsWith("gmail.com")) { //.abc.gob.ar
          mensaje.style.color = "red";
          mensaje.textContent = "El correo debe ser institucional (terminar en .abc.gob.ar)";
          return;
        }

        if (password !== password2) {
          mensaje.style.color = "red";
          mensaje.textContent = "Las contraseñas no coinciden.";
          return;
        }

        if (password.length < 8 && password.length > 15) {
          mensaje.style.color = "red";
          mensaje.textContent = "La contraseña debe tener entre 8 y 15 caracteres.";
          return;
        }

        const datos = {
          nombre,
          contacto,
          correo,
          correoAlt,
          escuela,
          distrito,
          nivel,
          usuario,
          password
        };

        google.script.run.withSuccessHandler(() => {
          mensaje.style.color = "green";
          mensaje.textContent = "✅ Registro enviado correctamente, revise el mail ingresado, hemos enviado un codigo de acceso";
          document.getElementById("formRegistro").reset();
        }).registrarUsuario(datos);
      }
    </script>
  </body>
</html>
