<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestor Plantel Docente</title>
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext y=%22.9em%22 font-size=%2290%22%3E%F0%9F%8E%93%3C/text%3E%3C/svg%3E' />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <header class="top-banner">
    <div class="brand-block">
      <span class="brand-icon" aria-hidden="true">&#127891;</span>
      <span class="brand-name">Gestor Plantel Docente</span>
    </div>
    <div class="user-block">
      <div class="user-meta">
        <span class="user-icon" aria-hidden="true">&#128100;</span>
        <span id="user-name" class="user-name">Sin sesion</span>
        <span id="user-email" class="user-email">-</span>
      </div>
      <button id="logout-btn" type="button">Cerrar sesion</button>
    </div>
  </header>
  <main class="app">
    <header class="header">
      <h1>Gestor Plantel Docente</h1>
      <p class="subtitle">Login</p>
    </header>

    <section id="login-section" class="card">
      <h2>Login</h2>
      <form id="login-form" class="row-form">
        <input id="login-email" type="email" placeholder="correo@dominio.com" required />
        <input id="login-password" type="password" placeholder="contrasena" required />
        <button type="submit">Ingresar</button>
      </form>
      <button id="google-login-btn" type="button" class="google-btn">Ingresar con Google</button>
      <p id="login-msg" class="msg"></p>
      <p class="msg">No tienes cuenta? <a href="/registro.html">Ir a registro</a></p>
    </section>

    <section id="panel-section" class="card is-hidden">
      <h2>Panel</h2>
      <p id="panel-msg" class="msg"></p>

      <div class="panel-nav">
        <button id="home-tab-btn" type="button">Inicio</button>
        <button id="settings-tab-btn" type="button" class="google-btn">Configuracion</button>
      </div>

      <section id="home-section" class="is-hidden">
        <h3>Inicio</h3>
        <p id="home-msg" class="msg"></p>
        <div id="home-course-buttons" class="review-actions"></div>
        <p id="home-selected-course" class="msg">Curso seleccionado: -</p>
        <div id="course-schedule-wrap" class="card is-hidden">
          <h3 id="course-schedule-title">Horario</h3>
          <div id="course-schedule-table"></div>
        </div>
      </section>

      <section id="settings-section" class="is-hidden">
      <div id="tenant-empty-import" class="is-hidden">
        <h3>Importar docentes desde Google Sheets</h3>
        <p id="course-buttons-msg" class="msg"></p>
        <div id="course-buttons" class="review-actions"></div>
        <p id="selected-course" class="msg">Curso seleccionado: -</p>
        <form id="sheet-import-form" class="grid-form">
          <label>URL Google Sheet <input id="sheet-url" type="url" placeholder="https://docs.google.com/spreadsheets/d/..." value="https://docs.google.com/spreadsheets/d/1sePsT0xdSgO-J4-ty84b0VSUz8LzE474nsTOvAWhOLQ/edit?usp=sharing" required /></label>
          <label>Nombre de hoja <input id="sheet-name" placeholder="POFA" value="POFA" required /></label>
          <div class="review-actions">
            <button type="submit">Cargar docentes</button>
            <button id="load-cursos-btn" type="button" class="google-btn">Cargar cursos</button>
          </div>
        </form>

        <div id="import-review" class="card is-hidden">
          <h3>Revision de docentes</h3>
          <p id="review-progress" class="msg"></p>
          <div id="review-docente" class="review-card"></div>
          <div class="review-actions">
            <button id="accept-docente-btn" type="button">Aceptar y guardar</button>
            <button id="skip-docente-btn" type="button" class="google-btn">Omitir</button>
            <button id="cancel-docente-btn" type="button" class="danger-btn">Cancelar</button>
          </div>
        </div>

        <div id="import-review-cursos" class="card is-hidden">
          <h3>Revision de cursos</h3>
          <p id="review-curso-progress" class="msg"></p>
          <div id="review-curso" class="review-card"></div>
          <div class="review-actions">
            <button id="accept-curso-btn" type="button">Aceptar y guardar</button>
            <button id="skip-curso-btn" type="button" class="google-btn">Omitir</button>
            <button id="cancel-curso-btn" type="button" class="danger-btn">Cancelar</button>
          </div>
        </div>

        <div id="bulk-save-wrap" class="review-actions is-hidden">
          <button id="save-all-btn" type="button">Guardar todo</button>
        </div>
      </div>
      </section>
    </section>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
